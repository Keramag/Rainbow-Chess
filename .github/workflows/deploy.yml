# .github/workflows/deploy.yml — Rainbow Chess CI/CD.
# Adapted from ../virusgame: test -> build & push image to GHCR -> Portainer redeploy.
# No bot-hoster image/webhook (this platform ships no AI/bot opponents).
name: Deploy Application

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:

# Read-only by default; build-and-push elevates its own permissions.
permissions:
  contents: read

jobs:
  # Job 1: run the full suite the same way `make test` does locally.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Single command so CI and local developers run identical tests.
      - name: Run tests (go test ./... + node --test)
        run: make test

  # Job 2: build the image and push it to GHCR, then pin the tag in compose.
  # Skipped for pull_request events (no push to a protected registry on PRs).
  build-and-push:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # GHCR image paths must be lowercase; repository_owner may be mixed-case.
      - name: Compute lowercase image name
        id: image
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${owner}/rainbow-chess" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          build-args: |
            COMMIT_SHA=${{ github.sha }}

      # Pin the just-built SHA into docker-compose.yml on the `deploy` branch so
      # Portainer (which tracks that branch) pulls the exact image CI produced.
      - name: Update and commit docker-compose.yml
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git checkout -B deploy
          sed -i "s|image: ghcr.io/[^/]*/rainbow-chess:.*|image: ${{ steps.image.outputs.name }}:${{ github.sha }}|g" docker-compose.yml
          git add docker-compose.yml
          git commit -m "ci: Update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push origin deploy --force

  # Job 3: tell Portainer to redeploy the stack from the updated compose.
  deploy:
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer Redeploy Webhook
        uses: distributhor/workflow-webhook@v3
        with:
          webhook_url: ${{ secrets.PORTAINER_REDEPLOY_HOOK }}
          webhook_secret: "trigger"
