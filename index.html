<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rainbow Chess</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="app-header">
      <h1 class="app-title">🌈 Rainbow Chess</h1>
      <div class="identity">
        <span class="you">You: <strong id="own-username">…</strong></span>
        <span id="connection-status" class="status offline">Disconnected</span>
      </div>
    </header>

    <main class="layout">
      <!-- Online users + challenge controls -->
      <section class="panel users-panel">
        <div class="panel-head">
          <h2>Players online</h2>
          <label class="variant-pick">
            Variant
            <select id="variant-picker"></select>
          </label>
        </div>
        <ul id="users-list" class="users-list"></ul>
        <p id="users-empty" class="muted">No one else is online yet. Open a second tab to play.</p>
      </section>

      <!-- Game area: chess board + click-to-move (board renderer in chess.js). -->
      <section class="panel game-panel">
        <h2>Game</h2>
        <div id="game-area" class="game-area" hidden>
          <div id="game-info" class="game-info"></div>
          <!-- The board plus a centered result card shown over it on game end.
               .board-wrap is the positioning context; the overlay sits absolutely
               centered over (and dims) #board-root while the game is over. -->
          <div class="board-wrap">
            <div id="board-root" class="board-root"></div>
            <div id="game-over-overlay" class="game-over-overlay" hidden>
              <p id="game-over-title" class="game-over-title"></p>
              <p id="game-over-detail" class="game-over-detail"></p>
            </div>
          </div>
          <div class="game-controls">
            <button id="resign-btn">Resign</button>
          </div>
          <!-- Shown on game end: result + return to the lobby-less menu. -->
          <div id="game-over" class="game-over" hidden>
            <p id="game-over-text" class="game-over-text"></p>
            <button id="back-to-menu" class="primary">New game</button>
          </div>
        </div>
        <p id="game-idle" class="muted">No active game. Challenge a player to start.</p>
      </section>
    </main>

    <!-- Incoming challenge prompt -->
    <div id="challenge-prompt" class="challenge-prompt" hidden>
      <p id="challenge-text"></p>
      <div class="challenge-actions">
        <button id="accept-challenge" class="primary">Accept</button>
        <button id="decline-challenge">Decline</button>
      </div>
    </div>

    <!-- Transient notifications -->
    <div id="toast" class="toast" hidden></div>

    <footer class="app-footer">
      <span id="commit-sha">Commit: __COMMIT_SHA__</span>
    </footer>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
